name: axiom-integrations
version: 0.1.0
language: python
description: Integration nodes for GitHub and Slack, including PR summarisation and channel notifications.
author: Axiom
license: MIT
nodes:
    - name: GitHubPRSummarizer
      input: PRDetails
      output: PRSummary
      description: Calls the Anthropic API to produce a one-paragraph plain-English summary of a pull request.
      required_secrets:
        - ANTHROPIC_API_KEY
    - name: SlackNotifier
      input: SlackMessage
      output: SlackResult
      description: Posts a message to a Slack channel via an incoming webhook URL.
      required_secrets:
        - SLACK_WEBHOOK_URL
